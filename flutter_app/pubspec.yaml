name: dyslexia_support
description: "Mobile app for supporting users with dyslexia through text simplification and reading accessibility features."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.3.0
  flutter_localizations:
    sdk: flutter

  # State Management
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1

  # Supabase & Authentication
  supabase_flutter: ^2.12.4
  supabase: ^2.10.6

  # HTTP Client
  dio: ^5.3.1

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Text-to-Speech
  flutter_tts: ^4.2.3

  # Network Monitoring
  connectivity_plus: ^7.1.1

  # Image Caching
  cached_network_image: ^3.3.0

  # UI Components
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.0.0
  logger: ^2.0.0
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  lucide_icons_flutter: ^3.1.14+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
        - asset: assets/fonts/OpenDyslexic-Italic.otf
          style: italic
        - asset: assets/fonts/OpenDyslexic-BoldItalic.otf
          weight: 700
          style: italic
